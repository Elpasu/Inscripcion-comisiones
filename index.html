<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reinscripción de Comisiones — Química Orgánica</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e2e0d8;
      --border-strong: #c8c6bc;
      --text: #1a1916;
      --text-muted: #6b6960;
      --text-hint: #9e9c94;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --accent-border: #bfdbfe;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --warn-bg: #fffbeb;
      --warn-border: #fcd34d;
      --radius: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page { max-width: 720px; margin: 0 auto; }

    /* Header */
    .header { margin-bottom: 2rem; }
    .header-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .header p { font-size: 15px; color: var(--text-muted); }

    /* Steps */
    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 2rem;
      align-items: center;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-hint);
    }
    .step.active { color: var(--text); font-weight: 500; }
    .step.done { color: var(--success); }
    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .step.active .step-num { background: var(--text); color: #fff; }
    .step.done .step-num { background: var(--success); color: #fff; }
    .step-sep { flex: 1; height: 1px; background: var(--border); }

    /* Section */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    /* Comision cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
      background: var(--surface);
    }
    .card:hover:not(.card-full) { border-color: var(--accent); }
    .card.card-selected {
      border: 2px solid var(--accent);
      background: var(--accent-bg);
    }
    .card.card-full {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .card-num {
      font-family: 'DM Mono', monospace;
      font-size: 32px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }
    .card-day {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 2px;
    }
    .card-hour {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .cupo-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cupo-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .cupo-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 0.3s;
    }
    .cupo-fill.almost { background: #f59e0b; }
    .cupo-fill.full-fill { background: var(--danger); }
    .cupo-text {
      font-size: 11px;
      color: var(--text-hint);
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
    }
    .full-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 10px;
      font-weight: 600;
      background: var(--danger-bg);
      color: var(--danger);
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* Form */
    .fields { display: flex; flex-direction: column; gap: 12px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      outline: none;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    /* Selected summary */
    .selected-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .selected-summary-num {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      min-width: 36px;
    }
    .selected-summary-info { flex: 1; }
    .selected-summary-info .s-day { font-size: 14px; font-weight: 500; }
    .selected-summary-info .s-hour { font-size: 13px; color: var(--text-muted); }
    .btn-change {
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Feedback */
    .feedback {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .feedback.ok { display: block; background: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }
    .feedback.err { display: block; background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }

    /* Admin */
    .admin-toggle {
      text-align: center;
      margin-top: 1.5rem;
    }
    .admin-toggle button {
      font-size: 13px;
      color: var(--text-hint);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
    .admin-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1rem;
      display: none;
    }
    .admin-panel.visible { display: block; }
    .admin-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .admin-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .admin-row input:focus { border-color: var(--accent); }
    .btn-admin {
      padding: 9px 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .admin-err { font-size: 13px; color: var(--danger); margin-bottom: 8px; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }
    .badge-com {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: var(--accent-bg);
      color: var(--accent);
    }
    .btn-danger {
      padding: 7px 14px;
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      margin-top: 1rem;
    }
    .btn-danger:hover { background: var(--danger-bg); }

    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-tag">FBIOyF · UNR</div>
    <h1>Reinscripción de comisiones</h1>
    <p>Química Orgánica &mdash; Seleccioná tu comisión nueva y completá tus datos</p>
  </div>

  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <span>Elegí comisión</span>
    </div>
    <div class="step-sep"></div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <span>Tus datos</span>
    </div>
    <div class="step-sep"></div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <span>Confirmado</span>
    </div>
  </div>

  <!-- Paso 1: Elegir comisión -->
  <div class="section" id="panel-comisiones">
    <div class="section-title">Comisiones disponibles</div>
    <div class="cards-grid" id="comisiones-container"></div>
  </div>

  <!-- Paso 2: Datos del alumno -->
  <div class="section" id="panel-form" style="display:none;">
    <div class="section-title">Tus datos</div>
    <div id="selected-summary"></div>
    <div class="fields">
      <div class="field">
        <label>Nombre y apellido</label>
        <input type="text" id="nombre" placeholder="Ej: Ana García" autocomplete="name">
      </div>
      <div class="field">
        <label>DNI (solo números)</label>
        <input type="text" id="legajo" placeholder="Ej: 40123456" inputmode="numeric">
      </div>
      <div class="field">
        <label>Comisión de origen</label>
        <select id="comision-original">
          <option value="4">Comisión 4 — Martes 7 a 11</option>
          <option value="5">Comisión 5 — Martes 12 a 16</option>
          <option value="8">Comisión 8 — Lunes 15:30 a 19:30</option>
          <option value="tuvieja">tuvieja</option>
        </select>
      </div>
    </div>
    <button class="btn-submit" id="btn-inscribir" onclick="submitInscripcion()">Confirmar inscripción</button>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Admin -->
  <div class="admin-toggle">
    <button onclick="toggleAdmin()">Acceso administrador</button>
  </div>
  <div class="admin-panel" id="admin-panel">
    <div class="section-title">Panel de administración</div>
    <div class="admin-row">
      <input type="password" id="admin-pass" placeholder="Contraseña">
      <button class="btn-admin" onclick="accederAdmin()">Ingresar</button>
    </div>
    <div class="admin-err" id="error-admin"></div>
    <div id="tabla-inscripciones" style="display:none;">
      <div class="table-wrap">
        <table id="inscripciones-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>DNI</th>
              <th>Com. origen</th>
              <th>Com. nueva</th>
            </tr>
          </thead>
          <tbody id="inscripciones-body"></tbody>
        </table>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 1rem;">
        <button class="btn-admin" onclick="descargarExcel()">Descargar Excel</button>
        <a href="admin-config.html" class="btn-admin" target="_blank" style="text-decoration: none; display: inline-flex; align-items: center; background: var(--accent); color: white; border: 1px solid var(--accent-border);">
          ⚙️ Configurar Comisiones
        </a>
      </div>
    </div>
  </div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="index.js"></script>
</body>
</html>
